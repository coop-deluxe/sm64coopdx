<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SM64 CoopDX - Web</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e0e0e0;
    }

    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      outline: none;
      z-index: 1;
    }

    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #overlay h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      color: #ffffff;
    }

    #overlay .subtitle {
      font-size: 1rem;
      color: #888;
      margin-bottom: 2rem;
    }

    #rom-picker {
      background: #16213e;
      border: 2px dashed #0f3460;
      border-radius: 12px;
      padding: 2rem 3rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease;
      margin-bottom: 1.5rem;
    }

    #rom-picker:hover {
      border-color: #e94560;
      background: #1a1a3e;
    }

    #rom-picker p {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }

    #rom-picker .hint {
      font-size: 0.85rem;
      color: #666;
    }

    #rom-file {
      display: none;
    }

    #progress-container {
      width: 320px;
      display: none;
      flex-direction: column;
      align-items: center;
    }

    #progress-bar-outer {
      width: 100%;
      height: 8px;
      background: #16213e;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 0.75rem;
    }

    #progress-bar-inner {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #e94560, #0f3460);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    #status {
      font-size: 0.9rem;
      color: #aaa;
      text-align: center;
      min-height: 1.5em;
    }

    #error-msg {
      color: #e94560;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      min-height: 1.5em;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <h1>SM64 CoopDX</h1>
    <p class="subtitle">WebAssembly Port</p>

    <div id="rom-picker" onclick="document.getElementById('rom-file').click()">
      <p>Click to select a ROM file</p>
      <p class="hint">Accepts .z64, .n64, .v64 (US version)</p>
    </div>
    <input type="file" id="rom-file" accept=".z64,.n64,.v64">

    <div id="progress-container">
      <div id="progress-bar-outer">
        <div id="progress-bar-inner"></div>
      </div>
      <div id="status">Initializing...</div>
    </div>

    <div id="error-msg"></div>
  </div>

  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

  <script>
    var ROM_DB_NAME = 'sm64coopdx_rom';
    var ROM_DB_STORE = 'roms';
    var ROM_DB_KEY = 'baserom';
    var Z64_MAGIC = 0x80371240;

    var romReady = false;
    var audioResumed = false;
    var gameStarted = false;

    // ---- IndexedDB helpers ----

    function openRomDB() {
      return new Promise(function(resolve, reject) {
        var req = indexedDB.open(ROM_DB_NAME, 1);
        req.onupgradeneeded = function(e) {
          e.target.result.createObjectStore(ROM_DB_STORE);
        };
        req.onsuccess = function(e) { resolve(e.target.result); };
        req.onerror = function(e) { reject(e.target.error); };
      });
    }

    function getCachedRom() {
      return openRomDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          var tx = db.transaction(ROM_DB_STORE, 'readonly');
          var store = tx.objectStore(ROM_DB_STORE);
          var req = store.get(ROM_DB_KEY);
          req.onsuccess = function() { resolve(req.result || null); };
          req.onerror = function() { resolve(null); };
        });
      });
    }

    function cacheRom(arrayBuffer) {
      return openRomDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          var tx = db.transaction(ROM_DB_STORE, 'readwrite');
          var store = tx.objectStore(ROM_DB_STORE);
          store.put(arrayBuffer, ROM_DB_KEY);
          tx.oncomplete = function() { resolve(); };
          tx.onerror = function(e) { reject(e.target.error); };
        });
      });
    }

    // ---- ROM validation ----

    function validateZ64(arrayBuffer) {
      if (arrayBuffer.byteLength < 0x800000) {
        return false;
      }
      var view = new DataView(arrayBuffer);
      var magic = view.getUint32(0, false);
      return magic === Z64_MAGIC;
    }

    function byteswapN64(buf) {
      var arr = new Uint8Array(buf);
      for (var i = 0; i < arr.length; i += 4) {
        var a = arr[i], b = arr[i+1], c = arr[i+2], d = arr[i+3];
        arr[i] = d; arr[i+1] = c; arr[i+2] = b; arr[i+3] = a;
      }
      return buf;
    }

    function byteswapV64(buf) {
      var arr = new Uint8Array(buf);
      for (var i = 0; i < arr.length; i += 2) {
        var tmp = arr[i];
        arr[i] = arr[i+1];
        arr[i+1] = tmp;
      }
      return buf;
    }

    function normalizeRom(arrayBuffer, filename) {
      var ext = filename.split('.').pop().toLowerCase();
      if (ext === 'n64') {
        arrayBuffer = byteswapN64(arrayBuffer);
      } else if (ext === 'v64') {
        arrayBuffer = byteswapV64(arrayBuffer);
      }
      return arrayBuffer;
    }

    // ---- UI helpers ----

    function showError(msg) {
      document.getElementById('error-msg').textContent = msg;
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function setProgress(pct) {
      document.getElementById('progress-bar-inner').style.width = pct + '%';
    }

    function showProgress() {
      document.getElementById('rom-picker').style.display = 'none';
      document.getElementById('progress-container').style.display = 'flex';
    }

    function hideOverlay() {
      var el = document.getElementById('overlay');
      if (el.classList.contains('hidden')) return;
      el.classList.add('hidden');
      document.getElementById('canvas').focus();
    }

    // ---- Write ROM to Emscripten FS and tell the game ----

    function getWritePath() {
      // Match the path used by fs_init in pc_main.c ("/sm64coopdx/")
      return '/sm64coopdx/';
    }

    function writeRomToFS(arrayBuffer) {
      try {
        var data = new Uint8Array(arrayBuffer);
        var writePath = getWritePath();

        // Ensure write directory exists
        try { FS.mkdir(writePath); } catch(e) { /* exists */ }

        var romPath = writePath + 'baserom.us.z64';
        FS.writeFile(romPath, data);
        console.log('[Web] ROM written to ' + romPath + ' (' + data.length + ' bytes)');

        // The C game loop in render_rom_setup_screen polls the filesystem
        // via main_rom_handler() and will find the ROM automatically.
        // No need to call into WASM from here.

        romReady = true;
        setStatus('ROM loaded. Game is starting...');
        setProgress(100);
        // Start polling for actual game rendering before hiding overlay
        waitForGameRender();
      } catch (e) {
        showError('Failed to write ROM to virtual filesystem: ' + e.message);
        console.error('[Web] writeRomToFS error:', e);
      }
    }

    // ---- ROM file handler ----

    function handleRomFile(file) {
      showError('');
      showProgress();
      setStatus('Reading ROM file...');
      setProgress(20);

      var reader = new FileReader();
      reader.onload = function(e) {
        setProgress(50);
        setStatus('Validating ROM...');

        var buf = normalizeRom(e.target.result, file.name);

        if (!validateZ64(buf)) {
          showError('Invalid ROM file. Please provide a valid SM64 US ROM (.z64 format).');
          document.getElementById('rom-picker').style.display = '';
          document.getElementById('progress-container').style.display = 'none';
          return;
        }

        setProgress(70);
        setStatus('Caching ROM for future visits...');

        cacheRom(buf).then(function() {
          setProgress(90);
          setStatus('Writing ROM to virtual filesystem...');
          writeRomToFS(buf);
        }).catch(function() {
          setStatus('Writing ROM to virtual filesystem...');
          writeRomToFS(buf);
        });
      };

      reader.onerror = function() {
        showError('Failed to read ROM file.');
      };

      reader.readAsArrayBuffer(file);
    }

    document.getElementById('rom-file').addEventListener('change', function(e) {
      if (e.target.files.length > 0) {
        handleRomFile(e.target.files[0]);
      }
    });

    // Also handle drag-and-drop onto the page
    document.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.stopPropagation();
    });
    document.addEventListener('drop', function(e) {
      e.preventDefault();
      e.stopPropagation();
      if (e.dataTransfer.files.length > 0) {
        handleRomFile(e.dataTransfer.files[0]);
      }
    });

    // ---- Audio context resume on first interaction ----

    function resumeAudio() {
      if (audioResumed) return;
      // SDL2 Emscripten creates the audio context as Module.SDL2.audioContext
      try {
        var ctx = (Module.SDL2 && Module.SDL2.audioContext) ||
                  (typeof AudioContext !== 'undefined' && new AudioContext());
        if (ctx && ctx.state === 'suspended') {
          ctx.resume();
        }
      } catch(e) {}
      audioResumed = true;
    }

    document.addEventListener('click', resumeAudio);
    document.addEventListener('keydown', resumeAudio);

    // ---- Watch for game rendering to start ----

    function waitForGameRender() {
      var canvas = document.getElementById('canvas');
      var checkInterval = setInterval(function() {
        try {
          var ctx = canvas.getContext('webgl2') || canvas.getContext('webgl');
          if (ctx) {
            var pixels = new Uint8Array(4);
            ctx.readPixels(canvas.width/2, canvas.height/2, 1, 1, ctx.RGBA, ctx.UNSIGNED_BYTE, pixels);
            if (pixels[0] > 0 || pixels[1] > 0 || pixels[2] > 0) {
              hideOverlay();
              clearInterval(checkInterval);
            }
          }
        } catch(e) {}
      }, 200);
      // Fallback: hide after 8 seconds regardless
      setTimeout(function() { clearInterval(checkInterval); hideOverlay(); }, 8000);
    }

    function watchForGameStart() {
      // Once the game has started rendering, hide the overlay
      // The game's loading screen replaces our overlay
      var checkInterval = setInterval(function() {
        if (gameStarted) {
          hideOverlay();
          clearInterval(checkInterval);
        }
      }, 500);
    }

    // ---- ROM URL loading via #rom=URL or ?rom=URL ----

    function getRomUrl() {
      // Check hash first: #rom=URL
      var hash = window.location.hash;
      if (hash && hash.indexOf('#rom=') === 0) {
        return decodeURIComponent(hash.substring(5));
      }
      // Check query param: ?rom=URL
      var params = new URLSearchParams(window.location.search);
      var romParam = params.get('rom');
      if (romParam) return romParam;
      return null;
    }

    function loadRomFromUrl(url) {
      showProgress();
      setStatus('Downloading ROM from URL...');
      setProgress(10);
      console.log('[Web] Fetching ROM from: ' + url);

      fetch(url).then(function(response) {
        if (!response.ok) throw new Error('HTTP ' + response.status);
        var total = parseInt(response.headers.get('content-length') || '0');
        var reader = response.body.getReader();
        var chunks = [];
        var loaded = 0;

        function pump() {
          return reader.read().then(function(result) {
            if (result.done) return;
            chunks.push(result.value);
            loaded += result.value.length;
            if (total > 0) {
              setProgress(10 + Math.round((loaded / total) * 60));
              setStatus('Downloading ROM... ' + Math.round(loaded / 1024 / 1024) + ' MB');
            }
            return pump();
          });
        }

        return pump().then(function() {
          // Combine chunks
          var totalLen = 0;
          for (var i = 0; i < chunks.length; i++) totalLen += chunks[i].length;
          var buf = new Uint8Array(totalLen);
          var offset = 0;
          for (var i = 0; i < chunks.length; i++) {
            buf.set(chunks[i], offset);
            offset += chunks[i].length;
          }
          return buf.buffer;
        });
      }).then(function(arrayBuffer) {
        setProgress(75);
        setStatus('Validating ROM...');
        // Normalize and validate
        var normalized = normalizeRom(arrayBuffer, url);
        if (!validateZ64(normalized)) {
          showError('Downloaded file is not a valid SM64 US ROM.');
          return;
        }
        setProgress(85);
        setStatus('Caching ROM...');
        cacheRom(normalized).then(function() {
          setStatus('Writing ROM to virtual filesystem...');
          function tryWrite() {
            if (typeof FS !== 'undefined') {
              writeRomToFS(normalized);
            } else {
              setTimeout(tryWrite, 100);
            }
          }
          tryWrite();
        }).catch(function() {
          // Cache failed but continue
          function tryWrite() {
            if (typeof FS !== 'undefined') {
              writeRomToFS(normalized);
            } else {
              setTimeout(tryWrite, 100);
            }
          }
          tryWrite();
        });
      }).catch(function(err) {
        console.error('[Web] ROM download failed:', err);
        showError('Failed to download ROM: ' + err.message);
        // Fall back to showing the file picker
        document.getElementById('rom-picker').style.display = '';
        document.getElementById('progress-container').style.display = 'none';
      });
    }

    // ---- Check for cached ROM or URL ROM on load ----

    function checkCachedRom() {
      var romUrl = getRomUrl();

      // First check if we have a cached ROM
      getCachedRom().then(function(buf) {
        if (buf) {
          showProgress();
          setStatus('Found cached ROM. Loading...');
          setProgress(50);

          function tryWriteRom() {
            if (typeof FS !== 'undefined' && typeof Module._main === 'function') {
              writeRomToFS(buf);
            } else {
              setTimeout(tryWriteRom, 100);
            }
          }
          tryWriteRom();
        } else if (romUrl) {
          // No cache but URL provided — download it
          function tryLoad() {
            if (typeof FS !== 'undefined') {
              loadRomFromUrl(romUrl);
            } else {
              setTimeout(tryLoad, 100);
            }
          }
          tryLoad();
        }
        // else: no cache, no URL — file picker is already visible
      }).catch(function() {
        if (romUrl) {
          function tryLoad() {
            if (typeof FS !== 'undefined') {
              loadRomFromUrl(romUrl);
            } else {
              setTimeout(tryLoad, 100);
            }
          }
          tryLoad();
        }
      });
    }

    // ---- Emscripten Module configuration ----

    var Module = {
      canvas: (function() {
        return document.getElementById('canvas');
      })(),

      // Don't run main automatically; we control startup
      noInitialRun: false,

      print: function(text) {
        console.log('[SM64] ' + text);
        // Detect when game rendering begins
        if (text && (text.indexOf('Game Init') !== -1 || text.indexOf('initialized') !== -1)) {
          gameStarted = true;
        }
      },

      printErr: function(text) {
        console.error('[SM64] ' + text);
      },

      setStatus: function(text) {
        if (text) {
          setStatus(text);
        }
      },

      monitorRunDependencies: function(left) {
        if (left === 0) {
          setStatus('All resources loaded.');
        } else {
          setStatus('Loading... (' + left + ' remaining)');
        }
      },

      onRuntimeInitialized: function() {
        setStatus('Runtime initialized. Checking for ROM...');
        checkCachedRom();
        watchForGameStart();
      },

      locateFile: function(path) {
        // Cache-bust WASM and data files during development
        return path + '?v=' + Date.now();
      }
    };

    window.onerror = function(msg, url, line, col, error) {
      console.error('[Web Shell] onerror:', msg, url, line, col, error);
      if (msg && msg.indexOf('abort') !== -1) {
        showError('An error occurred. Check the browser console for details.');
      }
    };

    window.onunhandledrejection = function(event) {
      console.error('[Web Shell] unhandled rejection:', event.reason);
    };

    // Monitor if the main loop stops
    var _webLastIterTime = Date.now();
    var _origRAF = window.requestAnimationFrame;
    window.requestAnimationFrame = function(cb) {
      return _origRAF.call(window, function(ts) {
        _webLastIterTime = Date.now();
        try { cb(ts); } catch(e) { console.error('[Web Shell] rAF callback exception:', e); }
      });
    };
    setInterval(function() {
      var stalled = Date.now() - _webLastIterTime;
      if (stalled > 10000) {
        console.warn('[Web Shell] Main loop stalled for ' + stalled + 'ms!');
      }
    }, 5000);

    // Detect WebGL context loss
    document.getElementById('canvas').addEventListener('webglcontextlost', function(e) {
      console.error('[Web Shell] WebGL context LOST!', e);
    });
    document.getElementById('canvas').addEventListener('webglcontextrestored', function(e) {
      console.warn('[Web Shell] WebGL context restored');
    });
  </script>

  {{{ SCRIPT }}}

</body>
</html>
