<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SM64 CoopDX - Web</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e0e0e0;
    }

    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      outline: none;
      z-index: 1;
    }

    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #overlay h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      color: #ffffff;
    }

    #overlay .subtitle {
      font-size: 1rem;
      color: #888;
      margin-bottom: 2rem;
    }

    #rom-picker {
      background: #16213e;
      border: 2px dashed #0f3460;
      border-radius: 12px;
      padding: 2rem 3rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease;
      margin-bottom: 1.5rem;
    }

    #rom-picker:hover {
      border-color: #e94560;
      background: #1a1a3e;
    }

    #rom-picker p {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }

    #rom-picker .hint {
      font-size: 0.85rem;
      color: #666;
    }

    #rom-file {
      display: none;
    }

    #progress-container {
      width: 320px;
      display: none;
      flex-direction: column;
      align-items: center;
    }

    #progress-bar-outer {
      width: 100%;
      height: 8px;
      background: #16213e;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 0.75rem;
    }

    #progress-bar-inner {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #e94560, #0f3460);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    #status {
      font-size: 0.9rem;
      color: #aaa;
      text-align: center;
      min-height: 1.5em;
    }

    #error-msg {
      color: #e94560;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      min-height: 1.5em;
      text-align: center;
    }

    /* Mod Manager Overlay */
    #mod-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); z-index: 200;
      display: none; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e0e0e0;
    }
    #mod-overlay.visible { display: flex; }
    #mod-panel {
      background: #1a1a2e; border: 2px solid #0f3460; border-radius: 12px;
      width: 520px; max-height: 80vh; display: flex; flex-direction: column;
      overflow: hidden;
    }
    #mod-panel-header {
      padding: 16px 20px; border-bottom: 1px solid #0f3460;
      display: flex; justify-content: space-between; align-items: center;
    }
    #mod-panel-header h2 { margin: 0; font-size: 1.3rem; }
    #mod-close-btn {
      background: none; border: none; color: #888; font-size: 1.5rem;
      cursor: pointer; padding: 0 4px;
    }
    #mod-close-btn:hover { color: #e94560; }
    #mod-upload-area {
      margin: 12px 20px; padding: 18px; text-align: center;
      background: #16213e; border: 2px dashed #0f3460; border-radius: 8px;
      cursor: pointer; transition: border-color 0.2s;
    }
    #mod-upload-area:hover { border-color: #e94560; }
    #mod-upload-area p { margin: 0; font-size: 0.95rem; }
    #mod-upload-area .hint { font-size: 0.8rem; color: #666; margin-top: 4px; }
    #mod-upload-file { display: none; }
    #mod-list {
      flex: 1; overflow-y: auto; padding: 0 20px 16px;
      min-height: 100px; max-height: 50vh;
    }
    .mod-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 6px; margin-top: 6px;
      background: #16213e;
    }
    .mod-item .mod-info { flex: 1; min-width: 0; }
    .mod-item .mod-name {
      font-weight: 600; font-size: 0.95rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mod-item .mod-desc {
      font-size: 0.75rem; color: #888; margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mod-toggle {
      width: 36px; height: 20px; border-radius: 10px;
      background: #333; border: none; cursor: pointer;
      position: relative; flex-shrink: 0; transition: background 0.2s;
    }
    .mod-toggle.on { background: #2ecc71; }
    .mod-toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 16px; height: 16px; border-radius: 50%;
      background: #fff; transition: transform 0.2s;
    }
    .mod-toggle.on::after { transform: translateX(16px); }
    .mod-delete {
      background: none; border: none; color: #666;
      cursor: pointer; font-size: 1.1rem; padding: 2px 6px; flex-shrink: 0;
    }
    .mod-delete:hover { color: #e94560; }
    #mod-empty { color: #666; text-align: center; padding: 24px 0; font-size: 0.9rem; }

    /* Touch Gamepad */
    #touch-gamepad {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 5; pointer-events: none; user-select: none; -webkit-user-select: none;
    }
    #touch-gamepad.visible { display: block; }
    #touch-stick-zone {
      position: absolute; left: 10px; bottom: 10px; width: 160px; height: 160px;
      pointer-events: auto; touch-action: none;
    }
    #touch-stick-base {
      position: absolute; left: 20px; bottom: 20px; width: 120px; height: 120px;
      border-radius: 50%; background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.2);
    }
    #touch-stick-knob {
      position: absolute; width: 50px; height: 50px; border-radius: 50%;
      background: rgba(255,255,255,0.35); left: 35px; top: 35px;
      pointer-events: none; transition: none;
    }
    .touch-btn {
      position: absolute; pointer-events: auto; touch-action: none;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-family: monospace; font-weight: bold; color: rgba(255,255,255,0.7);
      border: 2px solid rgba(255,255,255,0.2);
    }
    .touch-btn:active, .touch-btn.pressed { background: rgba(255,255,255,0.3) !important; }
    #tb-a { right: 20px; bottom: 100px; width: 64px; height: 64px; background: rgba(255,255,255,0.12); font-size: 22px; }
    #tb-b { right: 90px; bottom: 50px; width: 56px; height: 56px; background: rgba(255,255,255,0.1); font-size: 18px; }
    #tb-z { right: 160px; bottom: 100px; width: 50px; height: 50px; background: rgba(255,255,255,0.08); font-size: 16px; }
    #tb-start { top: 10px; left: 50%; transform: translateX(-50%); width: 60px; height: 34px;
      border-radius: 17px; background: rgba(255,255,255,0.08); font-size: 11px; }
    #tb-r { right: 20px; top: 10px; width: 50px; height: 34px;
      border-radius: 17px; background: rgba(255,255,255,0.08); font-size: 14px; }
    #tb-l { left: 10px; top: 10px; width: 50px; height: 34px;
      border-radius: 17px; background: rgba(255,255,255,0.08); font-size: 14px; }
    /* C-buttons cluster */
    .touch-cbtn {
      position: absolute; pointer-events: auto; touch-action: none;
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: monospace; font-size: 12px; font-weight: bold;
      color: rgba(255,200,50,0.7); background: rgba(255,200,50,0.08);
      border: 2px solid rgba(255,200,50,0.15);
    }
    .touch-cbtn:active, .touch-cbtn.pressed { background: rgba(255,200,50,0.3) !important; }
    #tb-cu { right: 110px; bottom: 210px; }
    #tb-cd { right: 110px; bottom: 140px; }
    #tb-cl { right: 145px; bottom: 175px; }
    #tb-cr { right: 75px; bottom: 175px; }
  </style>
</head>
<body>
  <div id="overlay">
    <h1>SM64 CoopDX</h1>
    <p class="subtitle">WebAssembly Port</p>

    <div id="rom-picker" onclick="document.getElementById('rom-file').click()">
      <p>Click to select a ROM file</p>
      <p class="hint">Accepts .z64, .n64, .v64 (US version)</p>
    </div>
    <input type="file" id="rom-file" accept=".z64,.n64,.v64">

    <div id="room-config" style="display:none; margin-bottom: 1rem; text-align: center;">
      <p style="margin-bottom: 0.5rem; color: #aaa;">Room ID (share to play together):</p>
      <input type="text" id="room-id-input" placeholder="Enter room name..."
             style="padding: 8px 16px; border-radius: 6px; border: 1px solid #0f3460;
                    background: #16213e; color: #e0e0e0; font-size: 1rem; width: 250px; text-align: center;">
    </div>

    <div id="progress-container">
      <div id="progress-bar-outer">
        <div id="progress-bar-inner"></div>
      </div>
      <div id="status">Initializing...</div>
    </div>

    <div id="error-msg"></div>
  </div>

  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

  <div id="mod-overlay">
    <div id="mod-panel">
      <div id="mod-panel-header">
        <h2>Mod Manager</h2>
        <button id="mod-close-btn" title="Close">&times;</button>
      </div>
      <div id="mod-upload-area" onclick="document.getElementById('mod-upload-file').click()">
        <p>Click to upload mod files</p>
        <p class="hint">Accepts .lua or .zip mod files</p>
      </div>
      <input type="file" id="mod-upload-file" accept=".lua,.luac,.zip" multiple>
      <div id="mod-list"></div>
    </div>
  </div>

  <div id="touch-gamepad">
    <div id="touch-stick-zone">
      <div id="touch-stick-base">
        <div id="touch-stick-knob"></div>
      </div>
    </div>
    <div class="touch-btn" id="tb-a">A</div>
    <div class="touch-btn" id="tb-b">B</div>
    <div class="touch-btn" id="tb-z">Z</div>
    <div class="touch-btn" id="tb-start">START</div>
    <div class="touch-btn" id="tb-r">R</div>
    <div class="touch-btn" id="tb-l">L</div>
    <div class="touch-cbtn" id="tb-cu">▲</div>
    <div class="touch-cbtn" id="tb-cd">▼</div>
    <div class="touch-cbtn" id="tb-cl">◀</div>
    <div class="touch-cbtn" id="tb-cr">▶</div>
  </div>

  <script>
    var ROM_DB_NAME = 'sm64coopdx_rom';
    var ROM_DB_STORE = 'roms';
    var ROM_DB_KEY = 'baserom';
    var Z64_MAGIC = 0x80371240;

    var romReady = false;
    var audioResumed = false;
    var gameStarted = false;

    // ---- IndexedDB helpers ----

    function openRomDB() {
      return new Promise(function(resolve, reject) {
        var req = indexedDB.open(ROM_DB_NAME, 1);
        req.onupgradeneeded = function(e) {
          e.target.result.createObjectStore(ROM_DB_STORE);
        };
        req.onsuccess = function(e) { resolve(e.target.result); };
        req.onerror = function(e) { reject(e.target.error); };
      });
    }

    function getCachedRom() {
      return openRomDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          var tx = db.transaction(ROM_DB_STORE, 'readonly');
          var store = tx.objectStore(ROM_DB_STORE);
          var req = store.get(ROM_DB_KEY);
          req.onsuccess = function() { resolve(req.result || null); };
          req.onerror = function() { resolve(null); };
        });
      });
    }

    function cacheRom(arrayBuffer) {
      return openRomDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          var tx = db.transaction(ROM_DB_STORE, 'readwrite');
          var store = tx.objectStore(ROM_DB_STORE);
          store.put(arrayBuffer, ROM_DB_KEY);
          tx.oncomplete = function() { resolve(); };
          tx.onerror = function(e) { reject(e.target.error); };
        });
      });
    }

    // ---- ROM validation ----

    function validateZ64(arrayBuffer) {
      if (arrayBuffer.byteLength < 0x800000) {
        return false;
      }
      var view = new DataView(arrayBuffer);
      var magic = view.getUint32(0, false);
      return magic === Z64_MAGIC;
    }

    function byteswapN64(buf) {
      var arr = new Uint8Array(buf);
      for (var i = 0; i < arr.length; i += 4) {
        var a = arr[i], b = arr[i+1], c = arr[i+2], d = arr[i+3];
        arr[i] = d; arr[i+1] = c; arr[i+2] = b; arr[i+3] = a;
      }
      return buf;
    }

    function byteswapV64(buf) {
      var arr = new Uint8Array(buf);
      for (var i = 0; i < arr.length; i += 2) {
        var tmp = arr[i];
        arr[i] = arr[i+1];
        arr[i+1] = tmp;
      }
      return buf;
    }

    function normalizeRom(arrayBuffer, filename) {
      var ext = filename.split('.').pop().toLowerCase();
      if (ext === 'n64') {
        arrayBuffer = byteswapN64(arrayBuffer);
      } else if (ext === 'v64') {
        arrayBuffer = byteswapV64(arrayBuffer);
      }
      return arrayBuffer;
    }

    // ---- UI helpers ----

    function showError(msg) {
      document.getElementById('error-msg').textContent = msg;
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function setProgress(pct) {
      document.getElementById('progress-bar-inner').style.width = pct + '%';
    }

    function showProgress() {
      document.getElementById('rom-picker').style.display = 'none';
      document.getElementById('progress-container').style.display = 'flex';
    }

    function hideOverlay() {
      var el = document.getElementById('overlay');
      if (el.classList.contains('hidden')) return;
      el.classList.add('hidden');
      document.getElementById('canvas').focus();
    }

    // ---- Write ROM to Emscripten FS and tell the game ----

    function getWritePath() {
      // Match the path used by fs_init in pc_main.c ("/sm64coopdx/")
      return '/sm64coopdx/';
    }

    function writeRomToFS(arrayBuffer) {
      try {
        var data = new Uint8Array(arrayBuffer);
        var writePath = getWritePath();

        // Ensure write directory exists
        try { FS.mkdir(writePath); } catch(e) { /* exists */ }

        var romPath = writePath + 'baserom.us.z64';
        FS.writeFile(romPath, data);
        console.log('[Web] ROM written to ' + romPath + ' (' + data.length + ' bytes)');

        // The C game loop in render_rom_setup_screen polls the filesystem
        // via main_rom_handler() and will find the ROM automatically.
        // No need to call into WASM from here.

        romReady = true;
        setStatus('ROM loaded. Game is starting...');
        setProgress(100);
        hideOverlay();
      } catch (e) {
        showError('Failed to write ROM to virtual filesystem: ' + e.message);
        console.error('[Web] writeRomToFS error:', e);
      }
    }

    // ---- ROM file handler ----

    function handleRomFile(file) {
      showError('');
      showProgress();
      setStatus('Reading ROM file...');
      setProgress(20);

      var reader = new FileReader();
      reader.onload = function(e) {
        setProgress(50);
        setStatus('Validating ROM...');

        var buf = normalizeRom(e.target.result, file.name);

        if (!validateZ64(buf)) {
          showError('Invalid ROM file. Please provide a valid SM64 US ROM (.z64 format).');
          document.getElementById('rom-picker').style.display = '';
          document.getElementById('progress-container').style.display = 'none';
          return;
        }

        setProgress(70);
        setStatus('Caching ROM for future visits...');

        cacheRom(buf).then(function() {
          setProgress(90);
          setStatus('Writing ROM to virtual filesystem...');
          writeRomToFS(buf);
        }).catch(function() {
          setStatus('Writing ROM to virtual filesystem...');
          writeRomToFS(buf);
        });
      };

      reader.onerror = function() {
        showError('Failed to read ROM file.');
      };

      reader.readAsArrayBuffer(file);
    }

    document.getElementById('rom-file').addEventListener('change', function(e) {
      if (e.target.files.length > 0) {
        handleRomFile(e.target.files[0]);
      }
    });

    // Also handle drag-and-drop onto the page
    document.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.stopPropagation();
    });
    document.addEventListener('drop', function(e) {
      e.preventDefault();
      e.stopPropagation();
      if (e.dataTransfer.files.length > 0) {
        handleRomFile(e.dataTransfer.files[0]);
      }
    });

    // ---- Audio context resume on first interaction ----

    function resumeAudio() {
      if (audioResumed) return;
      // SDL2 Emscripten creates the audio context as Module.SDL2.audioContext
      try {
        var ctx = (Module.SDL2 && Module.SDL2.audioContext) ||
                  (typeof AudioContext !== 'undefined' && new AudioContext());
        if (ctx && ctx.state === 'suspended') {
          ctx.resume();
        }
      } catch(e) {}
      audioResumed = true;
    }

    document.addEventListener('click', resumeAudio);
    document.addEventListener('keydown', resumeAudio);

    // ---- Watch for game rendering to start ----

    function waitForGameRender() {
      var canvas = document.getElementById('canvas');
      var checkInterval = setInterval(function() {
        try {
          var ctx = canvas.getContext('webgl2') || canvas.getContext('webgl');
          if (ctx) {
            var pixels = new Uint8Array(4);
            ctx.readPixels(canvas.width/2, canvas.height/2, 1, 1, ctx.RGBA, ctx.UNSIGNED_BYTE, pixels);
            if (pixels[0] > 0 || pixels[1] > 0 || pixels[2] > 0) {
              hideOverlay();
              clearInterval(checkInterval);
            }
          }
        } catch(e) {}
      }, 200);
      // Fallback: hide after 8 seconds regardless
      setTimeout(function() { clearInterval(checkInterval); hideOverlay(); }, 8000);
    }

    function watchForGameStart() {
      // Once the game has started rendering, hide the overlay
      // The game's loading screen replaces our overlay
      var checkInterval = setInterval(function() {
        if (gameStarted) {
          hideOverlay();
          clearInterval(checkInterval);
        }
      }, 500);
    }

    // ---- ROM URL loading via #rom=URL or ?rom=URL ----

    function getRomUrl() {
      // Check hash first: #rom=URL
      var hash = window.location.hash;
      if (hash && hash.indexOf('#rom=') === 0) {
        return decodeURIComponent(hash.substring(5));
      }
      // Check query param: ?rom=URL
      var params = new URLSearchParams(window.location.search);
      var romParam = params.get('rom');
      if (romParam) return romParam;
      return null;
    }

    function loadRomFromUrl(url) {
      showProgress();
      setStatus('Downloading ROM from URL...');
      setProgress(10);
      console.log('[Web] Fetching ROM from: ' + url);

      fetch(url).then(function(response) {
        if (!response.ok) throw new Error('HTTP ' + response.status);
        var total = parseInt(response.headers.get('content-length') || '0');
        var reader = response.body.getReader();
        var chunks = [];
        var loaded = 0;

        function pump() {
          return reader.read().then(function(result) {
            if (result.done) return;
            chunks.push(result.value);
            loaded += result.value.length;
            if (total > 0) {
              setProgress(10 + Math.round((loaded / total) * 60));
              setStatus('Downloading ROM... ' + Math.round(loaded / 1024 / 1024) + ' MB');
            }
            return pump();
          });
        }

        return pump().then(function() {
          // Combine chunks
          var totalLen = 0;
          for (var i = 0; i < chunks.length; i++) totalLen += chunks[i].length;
          var buf = new Uint8Array(totalLen);
          var offset = 0;
          for (var i = 0; i < chunks.length; i++) {
            buf.set(chunks[i], offset);
            offset += chunks[i].length;
          }
          return buf.buffer;
        });
      }).then(function(arrayBuffer) {
        setProgress(75);
        setStatus('Validating ROM...');
        // Normalize and validate
        var normalized = normalizeRom(arrayBuffer, url);
        if (!validateZ64(normalized)) {
          showError('Downloaded file is not a valid SM64 US ROM.');
          return;
        }
        setProgress(85);
        setStatus('Caching ROM...');
        cacheRom(normalized).then(function() {
          setStatus('Writing ROM to virtual filesystem...');
          function tryWrite() {
            if (typeof FS !== 'undefined') {
              writeRomToFS(normalized);
            } else {
              setTimeout(tryWrite, 100);
            }
          }
          tryWrite();
        }).catch(function() {
          // Cache failed but continue
          function tryWrite() {
            if (typeof FS !== 'undefined') {
              writeRomToFS(normalized);
            } else {
              setTimeout(tryWrite, 100);
            }
          }
          tryWrite();
        });
      }).catch(function(err) {
        console.error('[Web] ROM download failed:', err);
        showError('Failed to download ROM: ' + err.message);
        // Fall back to showing the file picker
        document.getElementById('rom-picker').style.display = '';
        document.getElementById('progress-container').style.display = 'none';
      });
    }

    // ---- Check for cached ROM or URL ROM on load ----

    function checkCachedRom() {
      var romUrl = getRomUrl();

      // First check if we have a cached ROM
      getCachedRom().then(function(buf) {
        if (buf) {
          showProgress();
          setStatus('Found cached ROM. Loading...');
          setProgress(50);

          function tryWriteRom() {
            if (typeof FS !== 'undefined' && typeof Module._main === 'function') {
              writeRomToFS(buf);
            } else {
              setTimeout(tryWriteRom, 100);
            }
          }
          tryWriteRom();
        } else if (romUrl) {
          // No cache but URL provided — download it
          function tryLoad() {
            if (typeof FS !== 'undefined') {
              loadRomFromUrl(romUrl);
            } else {
              setTimeout(tryLoad, 100);
            }
          }
          tryLoad();
        }
        // else: no cache, no URL — file picker is already visible
      }).catch(function() {
        if (romUrl) {
          function tryLoad() {
            if (typeof FS !== 'undefined') {
              loadRomFromUrl(romUrl);
            } else {
              setTimeout(tryLoad, 100);
            }
          }
          tryLoad();
        }
      });
    }

    // ---- Background tab keep-alive guard ----
    // Browsers throttle timers and can freeze WebRTC data channels when a tab
    // is backgrounded. We use three complementary techniques to prevent this:
    //  1. Web Locks API — holds a lock that keeps the event loop alive
    //  2. Silent audio oscillator — prevents aggressive timer throttling
    //  3. Visibility change detection — logs warnings and increases keepalive

    var BackgroundGuard = {
      _lockHeld: false,
      _audioCtx: null,
      _oscillator: null,
      _gainNode: null,
      _keepaliveInterval: null,
      _visible: true,

      start: function() {
        this._startWebLock();
        this._startSilentAudio();
        this._startVisibilityWatch();
        this._startKeepalive();
        console.log('[BackgroundGuard] Started — tab will stay alive when backgrounded');
      },

      // 1. Web Locks API: acquiring a lock keeps the tab's event loop from being frozen
      _startWebLock: function() {
        if (!navigator.locks) {
          console.warn('[BackgroundGuard] Web Locks API not available');
          return;
        }
        // Request a lock and never release it — the promise stays pending forever,
        // which signals the browser that this tab is doing important work.
        navigator.locks.request('sm64coopdx-keepalive', { mode: 'exclusive' }, function() {
          BackgroundGuard._lockHeld = true;
          console.log('[BackgroundGuard] Web Lock acquired');
          // Return a promise that never resolves to hold the lock
          return new Promise(function() {});
        }).catch(function(e) {
          console.warn('[BackgroundGuard] Web Lock failed:', e);
        });
      },

      // 2. Silent audio: a near-inaudible oscillator prevents Chrome from
      //    aggressively throttling timers (Chrome treats tabs with audio differently)
      _startSilentAudio: function() {
        try {
          var AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return;
          this._audioCtx = new AC();
          this._oscillator = this._audioCtx.createOscillator();
          this._gainNode = this._audioCtx.createGain();
          // Essentially inaudible
          this._gainNode.gain.value = 0.001;
          this._oscillator.frequency.value = 1; // 1 Hz — below hearing range
          this._oscillator.connect(this._gainNode);
          this._gainNode.connect(this._audioCtx.destination);
          this._oscillator.start();
          console.log('[BackgroundGuard] Silent audio started');
        } catch (e) {
          console.warn('[BackgroundGuard] Silent audio failed:', e);
        }
      },

      // 3. Visibility change: warn in console and increase PeerJS keepalive
      _startVisibilityWatch: function() {
        var self = this;
        document.addEventListener('visibilitychange', function() {
          if (document.hidden) {
            self._visible = false;
            console.warn('[BackgroundGuard] Tab is now HIDDEN — keep-alive active');
            // Resume audio context if it was suspended by the browser
            if (self._audioCtx && self._audioCtx.state === 'suspended') {
              self._audioCtx.resume().catch(function() {});
            }
          } else {
            self._visible = true;
            console.log('[BackgroundGuard] Tab is VISIBLE again');
          }
        });
      },

      // 4. Periodic PeerJS ping: send a tiny keepalive through data channels
      //    so the WebRTC SCTP association doesn't go idle. Normal interval is 5s,
      //    but when hidden we use 1s to be safe.
      _startKeepalive: function() {
        var KEEPALIVE_BYTE = 0xFF; // single-byte marker the C side will ignore (too small to be a valid packet)
        var self = this;

        // Use a worker-based timer that isn't throttled in background tabs.
        // Inline worker via Blob URL avoids needing an extra file.
        var workerCode = 'var interval=null;onmessage=function(e){if(interval)clearInterval(interval);interval=setInterval(function(){postMessage("tick")},e.data);}';
        try {
          var blob = new Blob([workerCode], { type: 'application/javascript' });
          var worker = new Worker(URL.createObjectURL(blob));
          worker.onmessage = function() { self._sendKeepalive(); };
          // Start with 5s interval
          worker.postMessage(5000);
          self._keepaliveWorker = worker;

          document.addEventListener('visibilitychange', function() {
            // Tighten interval when hidden
            worker.postMessage(document.hidden ? 1000 : 5000);
          });
        } catch (e) {
          // Fallback to setInterval (will be throttled but better than nothing)
          console.warn('[BackgroundGuard] Worker timer failed, falling back to setInterval');
          this._keepaliveInterval = setInterval(function() { self._sendKeepalive(); }, 3000);
        }
      },

      _sendKeepalive: function() {
        if (!PeerNetwork.peer || PeerNetwork.peer.destroyed) return;
        var ping = new Uint8Array([0xFF]);
        if (PeerNetwork.isHost) {
          for (var peerId in PeerNetwork.connections) {
            var conn = PeerNetwork.connections[peerId];
            if (conn && conn.open) {
              try { conn.send(ping); } catch (e) {}
            }
          }
        } else {
          var conn = PeerNetwork.connections[PeerNetwork.hostPeerId];
          if (conn && conn.open) {
            try { conn.send(ping); } catch (e) {}
          }
        }
      },

      stop: function() {
        if (this._oscillator) { try { this._oscillator.stop(); } catch(e) {} }
        if (this._audioCtx) { try { this._audioCtx.close(); } catch(e) {} }
        if (this._keepaliveInterval) clearInterval(this._keepaliveInterval);
        if (this._keepaliveWorker) this._keepaliveWorker.terminate();
        this._lockHeld = false;
        console.log('[BackgroundGuard] Stopped');
      }
    };

    // ---- PeerJS WebRTC networking module ----

    var PeerNetwork = {
      peer: null,           // Our PeerJS Peer instance
      connections: {},      // peerId -> DataConnection (for host: all clients; for client: just the host)
      isHost: false,
      roomId: null,
      hostPeerId: null,
      recvBuffer: [],       // Array of {slotId, data} for the C code to consume
      nextSlotId: 1,        // For host: assign slot IDs to connecting peers
      peerToSlot: {},       // peerId -> slotId
      slotToPeer: {},       // slotId -> peerId

      // Get room ID from URL: ?room=ROOMID
      getRoomId: function() {
        var params = new URLSearchParams(window.location.search);
        return params.get('room') || null;
      },

      // Generate the PeerJS peer ID for a host from room ID
      hostPeerIdFromRoom: function(roomId) {
        return 'sm64-' + roomId + '-host';
      },

      // Initialize: try to be host first, if host already exists, become client
      init: function(roomId) {
        this.roomId = roomId;
        this.hostPeerId = this.hostPeerIdFromRoom(roomId);

        // Try to register as host
        this.peer = new Peer(this.hostPeerId);

        this.peer.on('open', function(id) {
          // Successfully registered as host
          console.log('[PeerJS] Hosting room: ' + roomId + ' (peer ID: ' + id + ')');
          PeerNetwork.isHost = true;
          PeerNetwork._setupHost();
          BackgroundGuard.start();
        });

        this.peer.on('error', function(err) {
          if (err.type === 'unavailable-id') {
            // Host already exists - join as client
            console.log('[PeerJS] Room ' + roomId + ' exists, joining as client...');
            PeerNetwork.peer.destroy();
            PeerNetwork._joinAsClient();
          } else {
            console.error('[PeerJS] Error:', err);
          }
        });

        this.peer.on('disconnected', function() {
          // Lost connection to PeerJS signaling server — existing data channels
          // stay alive, but new clients can't join. Try to reconnect.
          if (!PeerNetwork._shuttingDown && PeerNetwork.peer && !PeerNetwork.peer.destroyed) {
            console.warn('[PeerJS] Host lost signaling server, reconnecting...');
            PeerNetwork.peer.reconnect();
          }
        });
      },

      _setupHost: function() {
        this.peer.on('connection', function(conn) {
          var slotId = PeerNetwork.nextSlotId++;
          console.log('[PeerJS] Client connecting: slot ' + slotId + ' peer ' + conn.peer);

          // Set up data handler immediately (works before or after open)
          conn.on('data', function(data) {
            var arr = new Uint8Array(data);
            // Ignore keepalive pings (single 0xFF byte)
            if (arr.length === 1 && arr[0] === 0xFF) return;
            if (PeerNetwork.recvBuffer.length < 3) {
              console.log('[PeerJS] HOST recv from slot ' + slotId + ': ' + arr.length + ' bytes');
            }
            PeerNetwork.recvBuffer.push({ slotId: slotId, data: arr });
          });

          // Register connection for sending only after open
          conn.on('open', function() {
            PeerNetwork.connections[conn.peer] = conn;
            PeerNetwork.peerToSlot[conn.peer] = slotId;
            PeerNetwork.slotToPeer[slotId] = conn.peer;
            console.log('[PeerJS] Client ready: slot ' + slotId + ' peer ' + conn.peer);
          });

          // If already open (can happen), register immediately
          if (conn.open) {
            PeerNetwork.connections[conn.peer] = conn;
            PeerNetwork.peerToSlot[conn.peer] = slotId;
            PeerNetwork.slotToPeer[slotId] = conn.peer;
            console.log('[PeerJS] Client ready (immediate): slot ' + slotId);
          }

          conn.on('close', function() {
            console.log('[PeerJS] Client disconnected: slot ' + slotId);
            delete PeerNetwork.connections[conn.peer];
            delete PeerNetwork.peerToSlot[conn.peer];
            delete PeerNetwork.slotToPeer[slotId];
          });
        });
      },

      _reconnectTimer: null,
      _reconnectAttempts: 0,
      _maxReconnectAttempts: 30,   // try for ~60 seconds
      _shuttingDown: false,        // true when intentional shutdown

      _joinAsClient: function() {
        // Create a new peer with random ID
        this.peer = new Peer();
        this.isHost = false;
        this._shuttingDown = false;

        this.peer.on('open', function(id) {
          console.log('[PeerJS] Our peer ID: ' + id + ', connecting to host...');
          PeerNetwork._connectToHost();
        });

        this.peer.on('disconnected', function() {
          // Lost connection to PeerJS signaling server — try to reconnect
          if (!PeerNetwork._shuttingDown && PeerNetwork.peer && !PeerNetwork.peer.destroyed) {
            console.warn('[PeerJS] Lost signaling server, reconnecting...');
            PeerNetwork.peer.reconnect();
          }
        });
      },

      _connectToHost: function() {
        if (!this.peer || this.peer.destroyed || this._shuttingDown) return;

        var conn = this.peer.connect(this.hostPeerId, { reliable: true, serialization: 'binary' });
        this.connections[this.hostPeerId] = conn;

        conn.on('open', function() {
          console.log('[PeerJS] Connected to host!');
          PeerNetwork._reconnectAttempts = 0;
          if (PeerNetwork._reconnectTimer) {
            clearTimeout(PeerNetwork._reconnectTimer);
            PeerNetwork._reconnectTimer = null;
          }
          BackgroundGuard.start();
        });

        conn.on('data', function(data) {
          // Received from host - queue for C code (no slot prefix in client mode)
          var arr = new Uint8Array(data);
          // Ignore keepalive pings (single 0xFF byte)
          if (arr.length === 1 && arr[0] === 0xFF) return;
          if (PeerNetwork.recvBuffer.length < 3) {
            console.log('[PeerJS] CLIENT recv from host: ' + arr.length + ' bytes');
          }
          PeerNetwork.recvBuffer.push({ slotId: 0, data: arr });
        });

        conn.on('close', function() {
          console.warn('[PeerJS] Disconnected from host');
          delete PeerNetwork.connections[PeerNetwork.hostPeerId];
          PeerNetwork._scheduleReconnect();
        });

        conn.on('error', function(err) {
          console.error('[PeerJS] Connection error:', err);
          delete PeerNetwork.connections[PeerNetwork.hostPeerId];
          PeerNetwork._scheduleReconnect();
        });
      },

      _scheduleReconnect: function() {
        if (this._shuttingDown || this._reconnectTimer) return;
        if (this._reconnectAttempts >= this._maxReconnectAttempts) {
          console.error('[PeerJS] Max reconnect attempts reached, giving up');
          return;
        }
        this._reconnectAttempts++;
        var delay = Math.min(2000 * this._reconnectAttempts, 10000); // 2s, 4s, 6s, ... cap at 10s
        console.log('[PeerJS] Reconnecting in ' + delay + 'ms (attempt ' + this._reconnectAttempts + '/' + this._maxReconnectAttempts + ')');
        this._reconnectTimer = setTimeout(function() {
          PeerNetwork._reconnectTimer = null;
          PeerNetwork._connectToHost();
        }, delay);
      },

      // Send data to a specific slot (host mode) or to host (client mode)
      _sendCount: 0,
      send: function(slotId, data) {
        this._sendCount++;
        if (this._sendCount <= 10) {
          console.log('[PeerJS] SEND slot=' + slotId + ' len=' + (data.byteLength || data.length) + ' isHost=' + this.isHost + ' slots=' + JSON.stringify(this.slotToPeer) + ' conns=' + Object.keys(this.connections).length);
        }
        if (this.isHost) {
          if (slotId === 0) {
            // Broadcast to all clients
            var count = 0;
            for (var peerId in this.connections) {
              var conn = this.connections[peerId];
              if (conn.open) { conn.send(data); count++; }
            }
            if (this._sendCount <= 10) console.log('[PeerJS] broadcast to ' + count + ' clients');
          } else {
            var peerId = this.slotToPeer[slotId];
            if (peerId && this.connections[peerId] && this.connections[peerId].open) {
              this.connections[peerId].send(data);
            } else {
              if (!this._relayFailLogged) this._relayFailLogged = 0;
              if (++this._relayFailLogged <= 20) {
                console.warn('[PeerJS] RELAY FAIL: slot=' + slotId + ' peerId=' + peerId + ' connExists=' + !!(peerId && this.connections[peerId]) + ' slots=' + JSON.stringify(this.slotToPeer));
              }
            }
          }
        } else {
          // Client: send to host
          var conn = this.connections[this.hostPeerId];
          if (conn && conn.open) conn.send(data);
        }
      },

      // Called from C via EM_JS
      drainRecvBuffer: function() {
        var packets = this.recvBuffer;
        this.recvBuffer = [];
        return packets;
      },

      // Check if connected
      isConnected: function() {
        if (this.isHost) return true; // Host is always "connected"

        return conn && conn.open;
      },

      shutdown: function() {
        this._shuttingDown = true;
        if (this._reconnectTimer) {
          clearTimeout(this._reconnectTimer);
          this._reconnectTimer = null;
        }
        this._reconnectAttempts = 0;
        BackgroundGuard.stop();
        for (var peerId in this.connections) {
          this.connections[peerId].close();

        this.connections = {};
        if (this.peer) this.peer.destroy();
        this.peer = null;
        this.isHost = false;
        this.peerToSlot = {};
        this.slotToPeer = {};
        this.nextSlotId = 1;
        this.recvBuffer = [];

    var MOD_DB_NAME = 'sm64coopdx_mods';

    function openModDB() {
      return new Promise(function(resolve, reject) {
        var req = indexedDB.open(MOD_DB_NAME, 1);
        req.onupgradeneeded = function(e) { e.target.result.createObjectStore(MOD_DB_STORE); };
        req.onsuccess = function(e) { resolve(e.target.result); };
        req.onerror = function(e) { reject(e.target.error); };

    function modDbGetAll() {
      return openModDB().then(function(db) {
        return new Promise(function(resolve) {
          var tx = db.transaction(MOD_DB_STORE, 'readonly');
          var store = tx.objectStore(MOD_DB_STORE);
          var req = store.getAllKeys();
          var entries = {};
          req.onsuccess = function() {
            var keys = req.result;
            if (!keys.length) { resolve({}); return; }
            var done = 0;
            keys.forEach(function(key) {
              store.get(key).onsuccess = function(e) {
                entries[key] = e.target.result;
                if (++done === keys.length) resolve(entries);
              };
            });
          };
          req.onerror = function() { resolve({}); };
        });
      });
    }

      return openModDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          var tx = db.transaction(MOD_DB_STORE, 'readwrite');

          tx.oncomplete = function() { resolve(); };
          tx.onerror = function(e) { reject(e.target.error); };
        });
      });
    }

        return new Promise(function(resolve) {
          var tx = db.transaction(MOD_DB_STORE, 'readwrite');

          tx.oncomplete = function() { resolve(); };
        });
      });

    // Restore mods from IndexedDB into Emscripten VFS
    function restoreModsFromDB() {
      return modDbGetAll().then(function(entries) {
        var keys = Object.keys(entries);
        if (!keys.length) return;
        try { FS.mkdir(MOD_VFS_PATH); } catch(e) {}
        keys.forEach(function(filename) {
          var data = entries[filename];
          // Check if this is a directory mod (stored as JSON manifest string)
          if (typeof data === 'string') {
            try {
              var manifest = JSON.parse(data);
              if (manifest._isDir && manifest.files) {
                var modDir = MOD_VFS_PATH + filename;
                try { FS.mkdir(modDir); } catch(ex) {}
                var filePaths = Object.keys(manifest.files);
                filePaths.forEach(function(rpath) {
                  // Ensure subdirectories exist
                  var parts = rpath.split('/');
                  var dir = modDir;
                  for (var p = 0; p < parts.length - 1; p++) {
                    dir += '/' + parts[p];
                    try { FS.mkdir(dir); } catch(ex) {}
                  }
                  // Decode base64 and write file
                  var b64 = manifest.files[rpath];
                  var bin = atob(b64);
                  var arr = new Uint8Array(bin.length);
                  for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
                  FS.writeFile(modDir + '/' + rpath, arr);
                });
                console.log('[ModManager] Restored directory mod: ' + filename + ' (' + filePaths.length + ' files)');
                return;
              }
            } catch(ex) { /* not JSON, treat as raw data */ }
          }
          FS.writeFile(MOD_VFS_PATH + filename, new Uint8Array(data));
          console.log('[ModManager] Restored mod: ' + filename + ' (' + data.byteLength + ' bytes)');
        });
        console.log('[ModManager] Restored ' + keys.length + ' mod(s) from IndexedDB');
      }).catch(function(e) {
        console.warn('[ModManager] Failed to restore mods:', e);
      });
    }

      uploadFiles: function(files) {

            } else {
              // .lua/.luac — write directly to mods dir and persist
              FS.writeFile(MOD_VFS_PATH + filename, data);
              modDbPut(filename, e.target.result).then(function() {
                console.log('[ModManager] Uploaded and persisted: ' + filename);
              }).catch(function(err) {
                console.error('[ModManager] Failed to persist ' + filename + ':', err);
              });
            }
            if (--pending === 0) {
              self.refresh();
            }
          };
          reader.readAsArrayBuffer(file);
        });
      },

      // Scan the VFS mods directory and persist every file to IndexedDB
      _persistModsDir: function() {
        try {
          var entries = FS.readdir(MOD_VFS_PATH).filter(function(f) { return f !== '.' && f !== '..'; });
          entries.forEach(function(filename) {
            try {
              var stat = FS.stat(MOD_VFS_PATH + filename);
              if (FS.isDir(stat.mode)) {
                // For directories, persist as a JSON manifest of their files
                var dirFiles = {};
                var _scanDir = function(base, rel) {
                  FS.readdir(base).filter(function(f) { return f !== '.' && f !== '..'; }).forEach(function(f) {
                    var full = base + '/' + f;
                    var s = FS.stat(full);
                    var rpath = rel ? rel + '/' + f : f;
                    if (FS.isDir(s.mode)) {
                      _scanDir(full, rpath);
                    } else {
                      dirFiles[rpath] = FS.readFile(full).buffer;
                    }
                  });
                };
                _scanDir(MOD_VFS_PATH + filename, '');
                // Store directory mod as a special object
                var manifest = { _isDir: true, files: {} };
                var fileKeys = Object.keys(dirFiles);
                fileKeys.forEach(function(rpath) {
                  // Convert ArrayBuffer to base64 for JSON storage
                  var arr = new Uint8Array(dirFiles[rpath]);
                  var bin = '';
                  for (var i = 0; i < arr.length; i++) bin += String.fromCharCode(arr[i]);
                  manifest.files[rpath] = btoa(bin);
                });
                modDbPut(filename, JSON.stringify(manifest)).then(function() {
                  console.log('[ModManager] Persisted directory mod: ' + filename + ' (' + fileKeys.length + ' files)');
                });
              } else {
                var fileData = FS.readFile(MOD_VFS_PATH + filename);
                modDbPut(filename, fileData.buffer).then(function() {
                  console.log('[ModManager] Persisted: ' + filename);
                });
              }
            } catch(ex) {
              console.warn('[ModManager] Failed to persist ' + filename + ':', ex);
            }
          });
        } catch(ex) {
          console.warn('[ModManager] Failed to scan mods dir:', ex);
        }
      },

      toggleMod: function(index) {
        if (!this._cwraps) return;
        var enabled = this._cwraps.getEnabled(index);
        this._cwraps.setEnabled(index, enabled ? 0 : 1);
        this._renderList();
      },

      deleteMod: function(index) {
        if (!this._cwraps) return;
        var path = this._cwraps.getPath(index);
        var filename = path.split('/').pop();
        // Remove from VFS (file or directory)
        try {
          var stat = FS.stat(MOD_VFS_PATH + filename);
          if (FS.isDir(stat.mode)) {
            // Recursively remove directory
            var rmrf = function(p) {
              FS.readdir(p).filter(function(f) { return f !== '.' && f !== '..'; }).forEach(function(f) {
                var full = p + '/' + f;
                var s = FS.stat(full);
                if (FS.isDir(s.mode)) rmrf(full); else FS.unlink(full);
              });
              FS.rmdir(p);
            };
            rmrf(MOD_VFS_PATH + filename);
          } else {
            FS.unlink(MOD_VFS_PATH + filename);
          }
        } catch(e) {}
        // Remove from IndexedDB
        modDbDelete(filename).then(function() {
          console.log('[ModManager] Deleted: ' + filename);
        });
        this.refresh();
      }
    };

    function _esc(s) {
      var d = document.createElement('div');
      d.appendChild(document.createTextNode(s));
      return d.innerHTML;
    }

    // Event handlers for mod overlay
    document.getElementById('mod-close-btn').addEventListener('click', function() { ModManager.hide(); });
    document.getElementById('mod-overlay').addEventListener('click', function(e) {
      if (e.target === this) ModManager.hide();
    });
    document.getElementById('mod-upload-file').addEventListener('change', function(e) {
      ModManager.uploadFiles(e.target.files);
      e.target.value = '';
    });
    // Drag and drop on upload area
    document.getElementById('mod-upload-area').addEventListener('dragover', function(e) { e.preventDefault(); });
    document.getElementById('mod-upload-area').addEventListener('drop', function(e) {
      e.preventDefault();
      ModManager.uploadFiles(e.dataTransfer.files);
    });
    // Event delegation for toggle and delete buttons
    document.getElementById('mod-list').addEventListener('click', function(e) {
      var toggle = e.target.closest('[data-toggle]');
      if (toggle) { ModManager.toggleMod(parseInt(toggle.getAttribute('data-toggle'), 10)); return; }
      var del = e.target.closest('[data-delete]');
      if (del) { ModManager.deleteMod(parseInt(del.getAttribute('data-delete'), 10)); return; }
    });

    // ---- Touch Gamepad ----
    var TouchGamepad = {
      _active: false,
      _keyDown: null,
      _keyUp: null,
      _setStick: null,
      _clearStick: null,
      _stickTouchId: null,
      _stickCenterX: 0,
      _stickCenterY: 0,
      _knob: null,
      _baseRect: null,

      // Default scancodes matching configfile.c defaults
      KEYS: {
        'tb-a':     0x0026,  // Z key → A button
        'tb-b':     0x0033,  // X key → B button
        'tb-z':     0x0025,  // Left Shift → Z trigger
        'tb-start': 0x0039,  // Space → Start
        'tb-r':     0x0036,  // Right Shift → R trigger
        'tb-l':     0x002A,  // Left Shift → L trigger
        'tb-cu':    0x0148,  // Numpad 8 → C-Up
        'tb-cd':    0x0150,  // Numpad 2 → C-Down
        'tb-cl':    0x014B,  // Numpad 4 → C-Left
        'tb-cr':    0x014D   // Numpad 6 → C-Right
      },

      init: function() {
        // Detect touch device
        if (!('ontouchstart' in window) && navigator.maxTouchPoints <= 0) return;

        this._keyDown = Module.cwrap('web_touch_key_down', null, ['number']);
        this._keyUp = Module.cwrap('web_touch_key_up', null, ['number']);
        this._setStick = Module.cwrap('web_touch_set_stick', null, ['number', 'number']);
        this._clearStick = Module.cwrap('web_touch_clear_stick', null, []);
        this._knob = document.getElementById('touch-stick-knob');

        document.getElementById('touch-gamepad').classList.add('visible');
        this._active = true;
        this._setupButtons();
        this._setupStick();
        console.log('[TouchGamepad] Initialized');
      },

      _setupButtons: function() {
        var self = this;
        var ids = Object.keys(this.KEYS);
        ids.forEach(function(id) {
          var el = document.getElementById(id);
          if (!el) return;
          var sc = self.KEYS[id];
          el.addEventListener('touchstart', function(e) {
            e.preventDefault();
            el.classList.add('pressed');
            self._keyDown(sc);
          }, { passive: false });
          el.addEventListener('touchend', function(e) {
            e.preventDefault();
            el.classList.remove('pressed');
            self._keyUp(sc);
          }, { passive: false });
          el.addEventListener('touchcancel', function(e) {
            el.classList.remove('pressed');
            self._keyUp(sc);
          });
        });
      },

      _setupStick: function() {
        var self = this;
        var zone = document.getElementById('touch-stick-zone');
        var base = document.getElementById('touch-stick-base');
        var RADIUS = 50; // max displacement in pixels

        zone.addEventListener('touchstart', function(e) {
          e.preventDefault();
          var touch = e.changedTouches[0];
          self._stickTouchId = touch.identifier;
          var rect = base.getBoundingClientRect();
          self._stickCenterX = rect.left + rect.width / 2;
          self._stickCenterY = rect.top + rect.height / 2;
          self._updateStick(touch.clientX, touch.clientY, RADIUS);
        }, { passive: false });

        zone.addEventListener('touchmove', function(e) {
          e.preventDefault();
          for (var i = 0; i < e.changedTouches.length; i++) {
            if (e.changedTouches[i].identifier === self._stickTouchId) {
              self._updateStick(e.changedTouches[i].clientX, e.changedTouches[i].clientY, RADIUS);
              break;
            }
          }
        }, { passive: false });

        var endStick = function(e) {
          for (var i = 0; i < e.changedTouches.length; i++) {
            if (e.changedTouches[i].identifier === self._stickTouchId) {
              self._stickTouchId = null;
              self._knob.style.transform = 'translate(0px, 0px)';
              self._clearStick();
              break;
            }
          }
        };
        zone.addEventListener('touchend', endStick, { passive: false });
        zone.addEventListener('touchcancel', endStick);
      },

      _updateStick: function(touchX, touchY, maxR) {
        var dx = touchX - this._stickCenterX;
        var dy = touchY - this._stickCenterY;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > maxR) { dx = dx / dist * maxR; dy = dy / dist * maxR; dist = maxR; }
        // Move knob visual
        this._knob.style.transform = 'translate(' + dx + 'px, ' + dy + 'px)';
        // Convert to -128..127 range
        var sx = Math.round((dx / maxR) * 127);
        var sy = Math.round((-dy / maxR) * 127); // Y inverted
        this._setStick(sx, sy);
      }
    };

    // Start touch gamepad once WASM is ready
    var _tgCheck = setInterval(function() {
      if (typeof Module !== 'undefined' && Module.cwrap) {
        try {
          Module.cwrap('web_touch_key_down', null, ['number']);
          clearInterval(_tgCheck);
          TouchGamepad.init();
        } catch(e) {}
      }
    }, 1000);
  </script>
